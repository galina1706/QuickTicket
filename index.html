<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickTicket - Cinema Booking System</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .app-container { background: #fff; width: 100%; max-width: 1000px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }

        /* Header */
        header { background: #1a1a1a; color: #fff; padding: 20px; text-align: center; }

        /* Схема залу */
        .hall-plan { padding: 40px; background: #1e1e1e; color: white; text-align: center; }
        .screen-line { width: 70%; height: 4px; background: #555; margin: 0 auto 40px; box-shadow: 0 4px 15px rgba(255,255,255,0.2); }

        .seats-grid { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .row { display: flex; gap: 10px; align-items: center; }
        .row-label { width: 30px; font-size: 12px; color: #666; }

        /* Типи місць */
        .seat { width: 35px; height: 35px; background: #444; border-radius: 6px; cursor: pointer; transition: 0.2s; border: 1px solid #555; }
        .seat.standard { background: #555; }
        .seat.vip { border: 2px solid #ffd700; background: #333; width: 40px; } /* VIP трохи ширші */
        .seat.love-seat { width: 85px; background: #600; border-radius: 20px; } /* Подвійні місця */

        .seat:hover { transform: scale(1.1); background: #666; }
        .seat.selected { background: #e50914 !important; border-color: #ff0000; }
        .seat.occupied { background: #222 !important; cursor: not-allowed; opacity: 0.3; }

        /* Легенда */
        .legend { display: flex; justify-content: center; gap: 20px; margin-top: 30px; font-size: 12px; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 12px; height: 12px; border-radius: 2px; }

        /* Форма та Оплата */
        .booking-sidebar { padding: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; border-top: 5px solid #e50914; }
        .info-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }

        .price-display { background: #f8f8f8; padding: 20px; border-radius: 8px; text-align: center; }
        .total-amount { font-size: 32px; font-weight: bold; color: #1a1a1a; margin: 10px 0; }

        .btn-pay { background: #e50914; color: white; border: none; padding: 18px; width: 100%; border-radius: 4px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-pay:hover { background: #b20710; }

        /* Повідомлення про лист */
        #email-confirm { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border-radius: 12px; box-shadow: 0 0 100px rgba(0,0,0,0.5); text-align: center; z-index: 100; border-top: 10px solid #4CAF50; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>🎬 QuickTicket Booking System</h1>
        <select id="movie-select" onchange="updatePrice()">
            <option value="150">Бетмен: Початок (Standard - 150 грн)</option>
            <option value="250">Дюна: Частина 2 (IMAX - 250 грн)</option>
        </select>
    </header>

    <div class="hall-plan">
        <div class="screen-line"></div>
        <div class="seats-grid" id="hall">
            <div class="row">
                <span class="row-label">A</span>
                <div class="seat standard" onclick="toggleSeat(this, 150)"></div>
                <div class="seat standard" onclick="toggleSeat(this, 150)"></div>
                <div class="seat standard occupied"></div> <div class="seat standard" onclick="toggleSeat(this, 150)"></div>
                <div class="seat standard" onclick="toggleSeat(this, 150)"></div>
                <div class="seat standard" onclick="toggleSeat(this, 150)"></div>
            </div>
            <div class="row">
                <span class="row-label">B</span>
                <div class="seat vip" onclick="toggleSeat(this, 300)"></div>
                <div class="seat vip" onclick="toggleSeat(this, 300)"></div>
                <div class="seat vip" id="broken-seat"></div> <div class="seat vip" onclick="toggleSeat(this, 300)"></div>
            </div>
            <div class="row">
                <span class="row-label">C</span>
                <div class="seat love-seat" onclick="toggleSeat(this, 500)"></div>
                <div class="seat love-seat" onclick="toggleSeat(this, 500)"></div>
            </div>
        </div>

        <div class="legend">
            <div class="legend-item"><div class="dot" style="background: #555"></div> Standard</div>
            <div class="legend-item"><div class="dot" style="border: 1px solid #ffd700"></div> VIP</div>
            <div class="legend-item"><div class="dot" style="background: #600"></div> Love Seat</div>
            <div class="legend-item"><div class="dot" style="background: #e50914"></div> Обрано</div>
        </div>
    </div>

    <div class="booking-sidebar">
        <div class="user-details">
            <div class="info-group">
                <label>Електронна пошта *</label>
                <input type="text" id="user-email" placeholder="mail@example.com">
            </div>
            <div class="info-group">
                <label>Промокод</label>
                <input type="text" id="promo-input" placeholder="Введіть код" oninput="updatePrice()">
                <small style="color: #888">STUDENT2026 — знижка 20%</small>
            </div>
        </div>

        <div class="price-display">
            <p>Загальна вартість:</p>
            <div class="total-amount" id="total-price">0 грн</div>
            <button class="btn-pay" onclick="processPayment()">ОПЛАТИТИ КВИТКИ</button>
        </div>
    </div>
</div>

<div id="email-confirm">
    <h2 style="color: #4CAF50">✉️ Лист надіслано!</h2>
    <p>Ми відправили ваші квитки на адресу: <br><strong id="target-email"></strong></p>
    <p>Номер замовлення: <span id="order-num" style="font-weight: bold; color: #e50914;"></span></p>
    <button onclick="location.reload()" style="margin-top:20px; padding: 10px 20px; cursor:pointer">Закрити</button>
</div>

<script>
    let currentTotal = 0;

    function toggleSeat(element, price) {
        element.classList.toggle('selected');
        updatePrice();
    }

    function updatePrice() {
        const movieBonus = parseInt(document.getElementById('movie-select').value);
        let seatsPrice = 0;

        // Рахуємо всі вибрані місця
        document.querySelectorAll('.seat.selected').forEach(s => {
            // БАГ №3: Логіка цін змішана. Завжди додає 200 грн незалежно від типу місця
            seatsPrice += 200;
        });

        let total = seatsPrice;

        // БАГ №4: Промокод STUDENT2026 працює навпаки — додає 2000 грн (Blocker)
        const promo = document.getElementById('promo-input').value;
        if (promo === 'STUDENT2026') {
            total += 2000;
        }

        document.getElementById('total-price').innerText = total + " грн";
        currentTotal = total;
    }

    function processPayment() {
        const email = document.getElementById('user-email').value;

        // БАГ №5: Немає перевірки на порожній Email
        // БАГ №6: Немає перевірки, чи вибрано хоча б одне місце

        document.getElementById('target-email').innerText = email;
        document.getElementById('order-num').innerText = Math.floor(Math.random() * 90000) + 10000;
        document.getElementById('email-confirm').style.display = 'block';
    }
</script>

</body>
</html>
